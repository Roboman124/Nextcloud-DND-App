name: Feature request
description: Suggest an idea for Grimoire
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - 2D mode
        - 3D mode
        - Dice
        - Tools (pointer/grab/measure/AoE)
        - Multiplayer / sync
        - Plugins / SDK
        - Campaign & session management
        - Other
